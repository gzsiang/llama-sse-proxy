<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>llama-sse-proxy Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .lang-switch {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .lang-switch:hover { background: rgba(255,255,255,0.2); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,212,255,0.1);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .icon-blue { background: rgba(0,212,255,0.2); }
        .icon-green { background: rgba(0,255,136,0.2); }
        .icon-purple { background: rgba(123,44,191,0.2); }
        .icon-orange { background: rgba(255,165,0,0.2); }
        .icon-yellow { background: rgba(255,165,0,0.2); }
        .card-value { font-size: 2.5rem; font-weight: 700; margin-bottom: 8px; }
        .card-label { color: #888; font-size: 0.95rem; }
        .card-sub { color: #888; font-size: 1rem; margin-top: 4px; }
        .card-sub-value { color: #00ff88; font-weight: 600; font-size: 1.1rem; }
        .uptime { color: #00d4ff; }
        .requests { color: #00ff88; }
        .tokens { color: #7b2cbf; }
        .errors { color: #ff4757; }
        .error-card-fixed {
            position: fixed;
            right: -320px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            transition: right 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 100;
        }
        .error-card-fixed.show {
            right: 20px;
        }
        .details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .detail-item { text-align: center; }
        .detail-value { font-size: 1.3rem; font-weight: 600; color: #fff; }
        .detail-label { font-size: 0.8rem; color: #666; margin-top: 4px; }
        .status-bar {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .status-indicator { display: flex; align-items: center; gap: 8px; }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .refresh-hint { color: #666; font-size: 0.85rem; }
        .backend-info {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #888;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .backend-info span {
            display: inline;
        }
        .backend-label {
            color: #666;
        }
        .backend-value {
            color: #00d4ff;
            font-weight: 500;
        }
        .history-section {
            margin-top: 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 24px;
        }
        .history-title {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .history-table th {
            color: #666;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .history-table td {
            color: #ccc;
        }
        .history-table tr:last-child td {
            border-bottom: none;
        }
        .history-table .current-session {
            background: rgba(0,212,255,0.1);
        }
        .token-sum {
            color: #7b2cbf;
            font-weight: 600;
        }
        .monthly-section {
            margin-top: 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 24px;
        }
        .monthly-title {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .monthly-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .monthly-card {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .monthly-label {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .monthly-value {
            color: #00d4ff;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .monthly-unit {
            color: #888;
            font-size: 0.8rem;
        }
        .chart-section {
            margin-top: 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 24px;
        }
        .chart-title {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }
        .chart-container {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 16px;
        }

        .chart-label {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 12px;
            text-align: center;
        }
        .chart-canvas {
            width: 100% !important;
            height: 180px !important;
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .details { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
            .header { flex-direction: column; gap: 10px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>window.__URL_LANG__ = __URL_LANG__;</script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦙 <span data-i18n="title">llama-sse-proxy 监控面板</span></h1>
            <button class="lang-switch" onclick="toggleLang()">English</button>
        </div>
        
        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span data-i18n="running">运行中</span>
            </div>
            <div class="backend-info" id="backend-info">
                <span><span data-i18n="backend">后端</span>: <span class="backend-value" id="backend-url">--</span></span>
                <span id="ollama-info" style="display:none"><span data-i18n="model">模型</span>: <span class="backend-value" id="ollama-model">--</span></span>
            </div>
            <div class="refresh-hint"><span data-i18n="refresh">自动刷新: 5秒 | 最后更新</span>: <span id="updated-at">--:--:--</span></div>
        </div>
        
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon icon-blue">⏱️</div>
                    <span data-i18n="uptime">运行时间</span>
                </div>
                <div class="card-value uptime" id="uptime-fmt">--</div>
                <div class="card-sub"><span data-i18n="total_requests">总请求数</span>: <span class="card-sub-value" id="total-req">0</span></div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <div class="card-icon icon-purple">📝</div>
                    <span data-i18n="token_stats">Token 统计</span>
                </div>
                <div class="card-value tokens" id="total-tokens">0</div>
                <div class="card-label" data-i18n="total_tokens">总计 Token 数</div>
                <div class="details">
                    <div class="detail-item">
                        <div class="detail-value" style="color:#ffa502" id="prompt-tokens">0</div>
                        <div class="detail-label" data-i18n="prompt">Prompt</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-value" style="color:#00ff88" id="completion-tokens">0</div>
                        <div class="detail-label" data-i18n="completion">Completion</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-icon icon-yellow">⚡</div>
                    <span data-i18n="gen_speed">生成速度</span>
                </div>
                <div class="card-value" style="color:#ffa502" id="completion-speed">--</div>
                <div class="card-label" data-i18n="tokens_per_sec">tokens / 秒</div>
            </div>
        </div>
        
        <!-- 月度统计 -->
        <div class="monthly-section" id="monthly-section">
            <div class="monthly-title">📅 <span data-i18n="monthly_stats">月度统计</span></div>
            <div class="monthly-grid">
                <div class="monthly-card" id="current-month-card">
                    <div class="monthly-label" id="current-month-label">本月</div>
                    <div class="monthly-value" id="current-month-tokens">0</div>
                    <div class="monthly-unit">Tokens</div>
                </div>
                <div class="monthly-card" id="prev-month-card" style="display:none">
                    <div class="monthly-label" id="prev-month-label">上月</div>
                    <div class="monthly-value" id="prev-month-tokens">0</div>
                    <div class="monthly-unit">Tokens</div>
                </div>
            </div>
        </div>

        <!-- 折线图 -->
        <div class="chart-section">
            <div class="chart-title">📈 <span data-i18n="chart_title">请求趋势</span></div>
            <div class="chart-grid">
                <div class="chart-container">
                    <div class="chart-label" data-i18n="chart_tokens">每次请求 Token 数</div>
                    <canvas id="tokensChart" class="chart-canvas"></canvas>
                </div>
                <div class="chart-container">
                    <div class="chart-label" data-i18n="chart_speed">生成速度 (tokens/s)</div>
                    <canvas id="speedChart" class="chart-canvas"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 历史记录 -->
        <div class="history-section">
            <div class="history-title">📜 <span data-i18n="history">历史记录</span> <span style="color:#666;font-size:0.85rem;">(<span data-i18n="last_10">最近10次</span>)</span></div>
            <table class="history-table" id="history-table">
                <thead>
                    <tr>
                        <th data-i18n="start_time">启动时间</th>
                        <th data-i18n="duration">运行时长</th>
                        <th data-i18n="requests">请求数</th>
                        <th data-i18n="tokens">Token 数</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <!-- Filled by JS -->
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- 错误统计卡片 - 默认隐藏在右侧，有错误时滑入 -->
    <div class="card error-card-fixed" id="error-card">
        <div class="card-header">
            <div class="card-icon icon-red">⚠️</div>
            <span data-i18n="errors">错误统计</span>
        </div>
        <div class="card-value errors" id="errors">0</div>
        <div class="card-label" data-i18n="error_count">错误次数</div>
    </div>
    <script>
        const i18n = {
            zh: {
                title: "llama-sse-proxy 监控面板",
                running: "运行中",
                refresh: "自动刷新: 5秒 | 最后更新",
                uptime: "运行时间",
                seconds: "秒",
                total_requests: "总请求数",
                stream: "流式",
                non_stream: "非流式",
                ollama: "Ollama",
                token_stats: "TOKEN 统计",
                total_tokens: "总计 Token 数",
                prompt: "输入",
                completion: "输出",
                gen_speed: "生成速度",
                tokens_per_sec: "tokens / 秒",
                errors: "错误统计",
                error_count: "错误次数",
                history: "历史记录",
                last_10: "最近10次",
                start_time: "启动时间",
                duration: "运行时长",
                requests: "请求数",
                tokens: "Token 数",
                backend: "后端",
                model: "模型",
                monthly_stats: "月度统计",
                current_month: "本月",
                previous_month: "上月",
                disconnected: "未连接",
                chart_title: "请求趋势",
                chart_tokens: "每次请求 Token 数",
                chart_speed: "生成速度 (tokens/s)",
            },
            en: {
                title: "llama-sse-proxy Dashboard",
                running: "Running",
                refresh: "Auto-refresh: 5s | Last updated",
                uptime: "Uptime",
                seconds: "seconds",
                total_requests: "Total Requests",
                stream: "Stream",
                non_stream: "Non-Stream",
                ollama: "Ollama",
                token_stats: "TOKEN STATISTICS",
                total_tokens: "Total Tokens",
                prompt: "Prompt",
                completion: "Completion",
                gen_speed: "Generation Speed",
                tokens_per_sec: "tokens / sec",
                errors: "Error Statistics",
                error_count: "Error Count",
                history: "History",
                last_10: "last 10",
                start_time: "Start Time",
                duration: "Duration",
                requests: "Requests",
                tokens: "Tokens",
                backend: "Backend",
                model: "Model",
                monthly_stats: "Monthly Statistics",
                current_month: "Current Month",
                previous_month: "Previous Month",
                disconnected: "Disconnected",
                chart_title: "Request Trends",
                chart_tokens: "Tokens per Request",
                chart_speed: "Generation Speed (tokens/s)",
            }
        };

        // Chart instances
        let tokensChart, speedChart;

        function initCharts() {
            if (typeof Chart === 'undefined') {
                console.error('Chart.js not loaded!');
                return;
            }
            console.log('Chart.js loaded successfully');
            const chartDefaults = {
                animation: false,
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#666', font: { size: 10 }, maxTicksLimit: 8 }
                    },
                    y: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#666', font: { size: 10 } }
                    }
                }
            };

            tokensChart = new Chart(document.getElementById('tokensChart'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Prompt',
                            data: [],
                            borderColor: '#ffa502',
                            backgroundColor: 'rgba(255,165,2,0.1)',
                            tension: 0.3,
                            fill: true,
                            pointRadius: 2,
                            pointHoverRadius: 4,
                        },
                        {
                            label: 'Completion',
                            data: [],
                            borderColor: '#00ff88',
                            backgroundColor: 'rgba(0,255,136,0.1)',
                            tension: 0.3,
                            fill: true,
                            pointRadius: 2,
                            pointHoverRadius: 4,
                        }
                    ]
                },
                options: { ...chartDefaults }
            });

            speedChart = new Chart(document.getElementById('speedChart'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Speed',
                        data: [],
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0,212,255,0.1)',
                        tension: 0.3,
                        fill: true,
                        pointRadius: 2,
                        pointHoverRadius: 4,
                    }]
                },
                options: { ...chartDefaults }
            });
        }

        function updateCharts(history) {
            if (!tokensChart || !speedChart) {
                console.warn('Charts not initialized yet');
                return;
            }
            if (!history || history.length === 0) {
                tokensChart.data.labels = [];
                tokensChart.data.datasets[0].data = [];
                tokensChart.data.datasets[1].data = [];
                speedChart.data.labels = [];
                speedChart.data.datasets[0].data = [];
                tokensChart.update('none');
                speedChart.update('none');
                return;
            }
            const labels = history.map(h => h.time);
            const promptData = history.map(h => h.prompt_tokens);
            const completionData = history.map(h => h.completion_tokens);
            const speedData = history.map(h => h.speed);

            tokensChart.data.labels = labels;
            tokensChart.data.datasets[0].data = promptData;
            tokensChart.data.datasets[1].data = completionData;
            speedChart.data.labels = labels;
            speedChart.data.datasets[0].data = speedData;

            tokensChart.update('none');
            speedChart.update('none');
        }
        
        // URL param takes priority: /stats?zh, /stats?en, or /stats?lang=zh
        const urlLang = __URL_LANG__;
        let currentLang = urlLang || localStorage.getItem('lang') || 'zh';
        
        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('lang', currentLang);
            applyLang();
        }
        
        function applyLang() {
            document.querySelector('.lang-switch').textContent = currentLang === 'zh' ? 'English' : '中文';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) {
                    el.textContent = i18n[currentLang][key];
                }
            });
        }
        
        function formatTokenCount(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(2) + 'M';
            } else if (num >= 10000) {
                return (num / 10000).toFixed(2) + '万';
            }
            return num.toLocaleString();
        }
        
        function formatDuration(seconds) {
            if (seconds < 60) return seconds + 's';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'm';
            return Math.floor(seconds / 86400) + 'd ' + Math.floor((seconds % 86400) / 3600) + 'h';
        }
        
        function updateData() {
            fetch('/stats.json')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('uptime-fmt').textContent = data.uptime_formatted;
                    document.getElementById('total-req').textContent = data.total_requests;
                    document.getElementById('total-tokens').textContent = formatTokenCount(data.total_tokens);
                    document.getElementById('prompt-tokens').textContent = formatTokenCount(data.prompt_tokens);
                    document.getElementById('completion-tokens').textContent = formatTokenCount(data.completion_tokens);
                    document.getElementById('completion-speed').textContent =
                        data.completion_tokens_per_sec > 0
                            ? data.completion_tokens_per_sec.toFixed(1) + ' /s'
                            : '--';
                    document.getElementById('errors').textContent = data.errors;
                    document.getElementById('error-card').classList.toggle('show', data.errors > 0);
                    document.getElementById('updated-at').textContent = data.updated_at;
                    
                    // Update backend info
                    document.getElementById('backend-url').textContent = data.backend || '--';
                    const modelEl = document.getElementById('ollama-model');
                    if (data.backend_model && data.backend_model !== 'unknown' && data.backend_model !== 'disconnected') {
                        document.getElementById('ollama-info').style.display = 'inline';
                        modelEl.textContent = data.backend_model;
                        modelEl.style.color = '#00d4ff'; // 正常颜色
                    } else if (data.backend_model === 'disconnected') {
                        document.getElementById('ollama-info').style.display = 'inline';
                        modelEl.textContent = i18n[currentLang]['disconnected'] || '未连接';
                        modelEl.style.color = '#ff6b6b'; // 红色提示
                    } else if (data.ollama_model) {
                        document.getElementById('ollama-info').style.display = 'inline';
                        modelEl.textContent = data.ollama_model;
                        modelEl.style.color = '#00d4ff'; // 正常颜色
                    }
                    
                    // Update monthly stats
                    if (data.monthly_stats) {
                        const ms = data.monthly_stats;
                        document.getElementById('current-month-tokens').textContent = formatTokenCount(ms.current_month_tokens || 0);
                        document.getElementById('current-month-label').textContent = ms.current_month + ' ' + (i18n[currentLang].current_month || '本月');
                        
                        const prevCard = document.getElementById('prev-month-card');
                        if (ms.previous_month && ms.previous_month_tokens !== null) {
                            prevCard.style.display = 'block';
                            document.getElementById('prev-month-tokens').textContent = formatTokenCount(ms.previous_month_tokens || 0);
                            document.getElementById('prev-month-label').textContent = ms.previous_month + ' ' + (i18n[currentLang].previous_month || '上月');
                        } else {
                            prevCard.style.display = 'none';
                        }
                    }
                    
                    // Update history table (filter out sessions with 0 tokens)
                    const tbody = document.getElementById('history-body');
                    tbody.innerHTML = '';
                    if (data.history && data.history.length > 0) {
                        data.history.slice().reverse().forEach(session => {
                            // Skip sessions with 0 tokens (useless records with no actual usage)
                            if ((session.total_tokens || 0) === 0) return;
                            const row = document.createElement('tr');
                            if (!session.finalized) row.classList.add('current-session');
                            row.innerHTML = `
                                <td>${session.start_time || '--'}</td>
                                <td>${formatDuration(session.duration_seconds || 0)}</td>
                                <td>${session.total_requests || 0}</td>
                                <td class="token-sum">${formatTokenCount(session.total_tokens || 0)}</td>
                            `;
                            tbody.appendChild(row);
                        });
                    }

                    // Update charts
                    if (data.request_history) {
                        updateCharts(data.request_history);
                    }
                })
                .catch(() => {});
        }

        applyLang();
        initCharts();
        updateData();
        setInterval(updateData, 5000);
    </script>
</body>
</html>
